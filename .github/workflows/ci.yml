name: CI

on:
  push:
  pull_request:

jobs:
  web-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            diamond-ide/package-lock.json
            diamond-compiler/backend/package-lock.json

      - name: Install IDE dependencies
        working-directory: diamond-ide
        run: npm ci

      - name: Install backend dependencies
        working-directory: diamond-compiler/backend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: diamond-ide
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Lint IDE
        run: npm --prefix diamond-ide run lint

      - name: Run IDE unit tests with coverage
        run: npm --prefix diamond-ide run test:unit -- --coverage

      - name: Run backend tests
        run: npm --prefix diamond-compiler/backend run test

      - name: Run IDE browser tests
        run: npm --prefix diamond-ide run test:e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ide-coverage
          path: diamond-ide/coverage/
          if-no-files-found: ignore

  native-core:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Linux native toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison gcc

      - name: Install Windows WinFlexBison
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tools\winflexbison" | Out-Null
          winget install --id WinFlexBison.win_flex_bison --accept-package-agreements --accept-source-agreements --silent --location "$env:GITHUB_WORKSPACE\.tools\winflexbison"

      - name: Install Windows WinLibs GCC
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.tools\winlibs" | Out-Null
          winget install --id BrechtSanders.WinLibs.POSIX.UCRT --accept-package-agreements --accept-source-agreements --silent --location "$env:GITHUB_WORKSPACE\.tools\winlibs"

      - name: Build native compiler
        run: node ./diamond-compiler/scripts/build-native.mjs

      - name: Run native regression suite
        run: node ./diamond-compiler/tests/run-native-regression.mjs

      - name: Upload native dashboard
        uses: actions/upload-artifact@v5
        with:
          name: native-dashboard-${{ runner.os }}
          path: |
            diamond-compiler/tests/report/latest-results.json
            diamond-compiler/tests/report/dashboard.md

  # Gap 1.4 — Docker build and push on main
  docker:
    needs: [web-stack, native-core]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine GHCR publish mode
        id: ghcr-publish
        run: |
          if [ "${{ github.repository_owner }}" = "shakin-emon01" ]; then
            echo "push_enabled=true" >> "$GITHUB_OUTPUT"
            echo "GHCR publish enabled for canonical owner context."
          else
            echo "push_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GHCR publish disabled because repository owner is '${{ github.repository_owner }}'. Images will be built but not pushed."
          fi

      - name: Login to GitHub Container Registry
        if: steps.ghcr-publish.outputs.push_enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./diamond-compiler
          file: ./diamond-compiler/backend/Dockerfile
          push: ${{ steps.ghcr-publish.outputs.push_enabled == 'true' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/diamond/diamond-backend:latest
            ghcr.io/${{ github.repository_owner }}/diamond/diamond-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push IDE image
        uses: docker/build-push-action@v6
        with:
          context: ./diamond-ide
          file: ./diamond-ide/Dockerfile
          push: ${{ steps.ghcr-publish.outputs.push_enabled == 'true' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/diamond/diamond-ide:latest
            ghcr.io/${{ github.repository_owner }}/diamond/diamond-ide:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
